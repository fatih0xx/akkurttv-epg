name: Update EPG

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/update-epg.yml"
  schedule:
    - cron: "35 4 * * *"

permissions:
  contents: write

concurrency:
  group: update-epg
  cancel-in-progress: false

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest EPG
        env:
          EPG_SOURCE_URL: ${{ secrets.EPG_SOURCE_URL }}
        run: |
          set -euo pipefail
          source_url="${EPG_SOURCE_URL:-}"
          if [ -z "$source_url" ]; then
            source_url="https://raw.githubusercontent.com/impresents/my-iptv-list/main/epg.xml"
          fi
          curl --location --fail --silent --show-error "$source_url" --output epg.xml.tmp

      - name: Validate EPG
        run: |
          set -euo pipefail
          test -s epg.xml.tmp
          grep -q "<tv" epg.xml.tmp
          grep -q "<channel" epg.xml.tmp
          grep -q "<programme" epg.xml.tmp
          mv epg.xml.tmp epg.xml

      - name: Commit updated EPG
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.xml
          if git diff --cached --quiet; then
            echo "EPG already up to date."
            exit 0
          fi
          git commit -m "Guncel EPG: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
